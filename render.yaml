services:
  - type: web
    name: ems-web
    env: docker
    region: frankfurt
    plan: free
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ems-db
          property: connectionString

databases:
  - name: ems-db
    databaseName: ems
    user: ems_user
    plan: free
    region: frankfurt
